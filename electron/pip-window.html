<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Slide Recorder - Aperçu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f12; color: #e4e4e7; font-family: system-ui, sans-serif; overflow: hidden; }
    #preview { width: 100%; height: 100%; object-fit: contain; display: block; }
    #controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px; background: rgba(0,0,0,0.8); display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    button { width: 36px; height: 36px; background: #1a1a20; border: 1px solid #27272a; border-radius: 6px; cursor: pointer; color: #e4e4e7; display: flex; align-items: center; justify-content: center; }
    button:hover { background: #27272a; }
    button.stop { width: auto; padding: 8px 14px; background: #ef4444; border: none; color: white; font-weight: 500; }
    #container { position: relative; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="container">
    <img id="preview" alt="Aperçu">
    <div id="controls">
      <button id="micBtn" title="Micro">🎤</button>
      <button id="camBtn" title="Caméra">📷</button>
      <button id="screenBtn" title="Écran">🖥</button>
      <button id="stopBtn" class="stop" title="Arrêter">⏹ Arrêter</button>
    </div>
  </div>
  <script>
    const api = window.pipAPI || {};
    const preview = document.getElementById('preview');
    const micBtn = document.getElementById('micBtn');
    const camBtn = document.getElementById('camBtn');
    const screenBtn = document.getElementById('screenBtn');
    const stopBtn = document.getElementById('stopBtn');

    api.onFrame?.((dataUrl) => { preview.src = dataUrl; });
    micBtn.onclick = () => api.sendControl?.('mic');
    camBtn.onclick = () => api.sendControl?.('cam');
    screenBtn.onclick = () => api.sendControl?.('screen');
    stopBtn.onclick = () => api.sendControl?.('stop');
    api.onState?.(({ mic, cam, screen }) => {
      micBtn.textContent = mic ? '🎤' : '🔇';
      camBtn.style.opacity = cam ? '1' : '0.5';
      screenBtn.style.opacity = screen ? '1' : '0.5';
    });
  </script>
</body>
</html>
